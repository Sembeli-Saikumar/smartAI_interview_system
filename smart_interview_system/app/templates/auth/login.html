<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — InterviewIQ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080b14;
      font-family: 'DM Sans', sans-serif;
      padding: 24px 16px;
      overflow-y: auto;
    }

    /* Orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: .12; pointer-events: none; z-index: 0; }
    .orb-1 { width: 500px; height: 500px; background: #0affed; top: -150px; left: -150px; }
    .orb-2 { width: 400px; height: 400px; background: #6366f1; bottom: -120px; right: -120px; }
    .orb-3 { width: 300px; height: 300px; background: #f59e0b; top: 50%; left: 50%; transform: translate(-50%,-50%); opacity: .05; }

    /* Card */
    .login-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 460px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 24px;
      padding: 44px 40px;
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 80px rgba(0,0,0,.4);
    }

    /* Brand */
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .brand-icon {
      width: 46px; height: 46px; border-radius: 14px;
      background: linear-gradient(135deg, #0affed, #6366f1);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: #080b14;
    }
    .brand-name {
      font-family: 'Instrument Serif', serif;
      font-size: 1.6rem; color: #fff;
    }
    .brand-name em {
      font-style: italic;
      background: linear-gradient(135deg, #0affed, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    h2 { font-family: 'Instrument Serif', serif; font-size: 1.8rem; color: #fff; margin-bottom: 6px; }
    .sub { color: rgba(255,255,255,.4); font-size: .9rem; margin-bottom: 28px; }

    /* Flash */
    .flash { border-radius: 10px; padding: 10px 14px; font-size: .84rem; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
    .flash-success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); color: #4ade80; }
    .flash-danger  { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.25);  color: #f87171; }
    .flash-warning { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.25); color: #fbbf24; }
    .flash-info    { background: rgba(14,165,233,.1); border: 1px solid rgba(14,165,233,.25); color: #38bdf8; }

    /* Role selector */
    .role-label { font-size: .7rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: 10px; }
    .role-btns { display: flex; gap: 10px; margin-bottom: 28px; }
    .role-btn {
      flex: 1; padding: 12px 8px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      color: rgba(255,255,255,.4);
      font-family: 'DM Sans', sans-serif; font-size: .8rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .role-btn i { font-size: 1.3rem; }
    .role-btn:hover { background: rgba(255,255,255,.07); color: #fff; border-color: rgba(255,255,255,.15); }
    .role-btn.active-admin        { background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.35); color: #fbbf24; }
    .role-btn.active-interviewer  { background: rgba(99,102,241,.12);  border-color: rgba(99,102,241,.35);  color: #818cf8; }
    .role-btn.active-candidate    { background: rgba(10,255,237,.1);   border-color: rgba(10,255,237,.3);   color: #0affed; }

    /* Form fields */
    .field-group { margin-bottom: 18px; }
    .field-label { font-size: .75rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,.4); margin-bottom: 8px; display: block; }
    .field-wrap { position: relative; }
    .field-input {
      width: 100%; padding: 14px 44px 14px 44px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      color: #fff; font-family: 'DM Sans', sans-serif; font-size: .95rem;
      outline: none; transition: border-color .2s, background .2s;
    }
    .field-input::placeholder { color: rgba(255,255,255,.2); }
    .field-input:focus { border-color: rgba(10,255,237,.4); background: rgba(10,255,237,.04); }
    .field-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,.25); font-size: 1rem; pointer-events: none; }
    .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,.25); cursor: pointer; font-size: 1rem; padding: 0; transition: color .2s; }
    .toggle-pw:hover { color: rgba(255,255,255,.6); }

    /* Remember */
    .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
    .remember-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: #0affed; cursor: pointer; }
    .remember-row label { font-size: .83rem; color: rgba(255,255,255,.35); cursor: pointer; }

    /* Submit */
    .btn-signin {
      width: 100%; padding: 15px;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, #0affed, #6366f1);
      color: #080b14; font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 1rem; cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(10,255,237,.25);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 20px;
    }
    .btn-signin:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(10,255,237,.35); }

    /* Register link */
    .register-row { text-align: center; font-size: .87rem; color: rgba(255,255,255,.35); }
    .register-row a { color: #0affed; text-decoration: none; font-weight: 600; }
    .register-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-cpu-fill"></i></div>
      <div class="brand-name">Interview<em>IQ</em></div>
    </div>

    <h2>Welcome back</h2>
    <p class="sub">Sign in to continue your interview prep</p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">
            <i class="bi bi-info-circle"></i> {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Role Selector -->
    <div class="role-label">Login as</div>
    <div class="role-btns">
      <button type="button" class="role-btn" id="btn-admin" onclick="fillRole('admin')">
        <i class="bi bi-shield-check"></i> Admin
      </button>
      <button type="button" class="role-btn" id="btn-interviewer" onclick="fillRole('interviewer')">
        <i class="bi bi-person-badge"></i> Interviewer
      </button>
      <button type="button" class="role-btn" id="btn-candidate" onclick="fillRole('candidate')">
        <i class="bi bi-person-circle"></i> Candidate
      </button>
    </div>

    <!-- Form -->
    <form action="/auth/login" method="POST" novalidate>

      <div class="field-group">
        <label class="field-label">Email Address</label>
        <div class="field-wrap">
          <i class="bi bi-envelope field-icon"></i>
          <input type="email" class="field-input" name="email" id="emailField" placeholder="you@example.com" required/>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <i class="bi bi-lock field-icon"></i>
          <input type="password" class="field-input" name="password" id="pwField" placeholder="Enter your password" required/>
          <button type="button" class="toggle-pw" onclick="togglePw()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="rememberMe"/>
        <label for="rememberMe">Remember me</label>
      </div>

      <button type="submit" class="btn-signin">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>

    <div class="register-row">
      Don't have an account? <a href="/auth/register">Create one</a>
    </div>
  </div>

  <script>
    const roles = {
      admin:       { email: 'ssaikumar99513@gmail.com', cls: 'active-admin' },
      interviewer: { email: 'interviewer@test.com',     cls: 'active-interviewer' },
      candidate:   { email: '',                          cls: 'active-candidate' },
    };
    function fillRole(role) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active-admin','active-interviewer','active-candidate'));
      document.getElementById('btn-' + role).classList.add(roles[role].cls);
      document.getElementById('emailField').value = roles[role].email;
      document.getElementById('pwField').focus();
    }
    function togglePw() {
      const f = document.getElementById('pwField');
      const i = document.getElementById('eyeIcon');
      if (f.type === 'password') { f.type = 'text'; i.className = 'bi bi-eye-slash'; }
      else { f.type = 'password'; i.className = 'bi bi-eye'; }
    }
  </script>
</body>
</html>
