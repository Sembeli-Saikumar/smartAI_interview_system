<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — InterviewIQ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; padding:40px 16px; }
    .glass-card { max-width:480px; }
    .brand { margin-bottom:28px; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="glass-card">
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-cpu-fill"></i></div>
      <div class="brand-name">Interview<span>IQ</span></div>
    </div>

    <h2>Create account</h2>
    <p class="sub">Get started with AI-powered interview prep</p>

    <!-- Step progress pills -->
    <div class="steps">
      <div class="step-pill active"></div>
      <div class="step-pill active"></div>
      <div class="step-pill active"></div>
    </div>

    <form action="/auth/register" method="POST" novalidate>

      <!-- Full Name -->
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <div class="input-wrap">
          <input type="text" class="form-control" name="name" placeholder="Alex Morgan" required/>
          <i class="bi bi-person input-icon"></i>
        </div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-wrap">
          <input type="email" class="form-control" name="email" placeholder="you@example.com" required/>
          <i class="bi bi-envelope input-icon"></i>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-1">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-control" name="password" id="pwField"
                 placeholder="Min. 8 characters" oninput="checkStrength(this.value)" required/>
          <i class="bi bi-lock input-icon"></i>
          <button type="button" class="toggle-pw" onclick="togglePw()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
        <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
        <div class="strength-label" id="strengthLabel">Enter a password</div>
      </div>

      <!-- Confirm Password -->
      <div class="mb-3 mt-3">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" class="form-control" name="confirm_password" placeholder="Re-enter password" required/>
          <i class="bi bi-shield-lock input-icon"></i>
        </div>
      </div>

      <!-- Role selector -->
      <div class="mb-3">
        <label class="form-label">I am preparing for</label>
        <div class="role-grid">
          <label class="role-card selected">
            <input type="radio" name="role" value="software" checked/>
            <i class="bi bi-code-slash"></i>
            Software Engineer
          </label>
          <label class="role-card">
            <input type="radio" name="role" value="product"/>
            <i class="bi bi-bar-chart-line"></i>
            Product Manager
          </label>
          <label class="role-card">
            <input type="radio" name="role" value="data"/>
            <i class="bi bi-database"></i>
            Data Scientist
          </label>
          <label class="role-card">
            <input type="radio" name="role" value="design"/>
            <i class="bi bi-palette"></i>
            UX Designer
          </label>
        </div>
      </div>

      <!-- Terms -->
      <div class="form-check mb-1">
        <input class="form-check-input" type="checkbox" id="terms" required/>
        <label class="form-check-label" for="terms">
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="btn-primary-glow">
        <i class="bi bi-rocket-takeoff me-2"></i>Create Account
      </button>

    </form>

    <p class="login-link">Already have an account? <a href="/auth/login">Sign in</a></p>
  </div>

  <script>
    function togglePw() {
      const f = document.getElementById('pwField');
      const i = document.getElementById('eyeIcon');
      if (f.type === 'password') { f.type = 'text'; i.className = 'bi bi-eye-slash'; }
      else { f.type = 'password'; i.className = 'bi bi-eye'; }
    }

    function checkStrength(val) {
      const bar = document.getElementById('strengthBar');
      const lbl = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 8)          score++;
      if (/[A-Z]/.test(val))        score++;
      if (/[0-9]/.test(val))        score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const map = [
        { w:'0%',   bg:'#ef4444', txt:'Too weak' },
        { w:'30%',  bg:'#ef4444', txt:'Weak' },
        { w:'55%',  bg:'#f59e0b', txt:'Fair' },
        { w:'80%',  bg:'#22c55e', txt:'Good' },
        { w:'100%', bg:'#0affed', txt:'Strong 🔒' },
      ];
      bar.style.width      = map[score].w;
      bar.style.background = map[score].bg;
      lbl.textContent      = map[score].txt;
      lbl.style.color      = map[score].bg;
    }

    document.querySelectorAll('.role-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
      });
    });
  </script>
</body>
</html>
