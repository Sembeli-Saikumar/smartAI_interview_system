{% extends "base.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:#080b14; }

.iv-page { min-height:100vh; background:#080b14; display:flex; flex-direction:column; position:relative; overflow:hidden; }
.iv-bg { position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse 50% 40% at 5% 10%, rgba(10,255,237,.08) 0%, transparent 60%),
              radial-gradient(ellipse 45% 35% at 95% 85%, rgba(99,102,241,.1) 0%, transparent 55%); }
.iv-grid { position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:60px 60px; }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
@keyframes pulse  { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(1.5);} }
@keyframes ripple { 0%{transform:scale(1);opacity:.6;} 100%{transform:scale(2.2);opacity:0;} }
@keyframes blink  { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* Top bar */
.iv-topbar { position:relative; z-index:20; display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid rgba(255,255,255,.06); }
.iv-brand { font-family:'Instrument Serif',serif; font-size:1.1rem; color:#fff; }
.iv-brand em { font-style:italic; background:linear-gradient(135deg,#0affed,#818cf8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.progress-wrap { display:flex; align-items:center; gap:10px; }
.progress-text { font-size:.78rem; color:rgba(255,255,255,.4); }
.progress-bar-track { width:120px; height:4px; background:rgba(255,255,255,.08); border-radius:99px; overflow:hidden; }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,#0affed,#818cf8); border-radius:99px; transition:width .5s ease; }
.timer-badge { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:99px; padding:5px 14px; font-size:.85rem; color:#fff; font-weight:600; }
.timer-badge.warning { border-color:rgba(245,158,11,.4); color:#fbbf24; background:rgba(245,158,11,.08); }
.timer-badge.danger  { border-color:rgba(239,68,68,.4);  color:#f87171; background:rgba(239,68,68,.08); animation:blink 1s infinite; }

/* Main layout */
.iv-main { position:relative; z-index:10; flex:1; display:grid; grid-template-columns:1fr 1fr; gap:24px; padding:24px; max-width:1200px; width:100%; margin:0 auto; }

/* Camera side */
.camera-side { display:flex; flex-direction:column; gap:16px; }
.camera-wrap { position:relative; border-radius:20px; overflow:hidden; background:#0d1117; border:1px solid rgba(255,255,255,.08); aspect-ratio:4/3; }
.camera-video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
.camera-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; background:rgba(8,11,20,.8); }
.camera-off-icon { font-size:3rem; color:rgba(255,255,255,.2); }
.camera-off-text { font-size:.85rem; color:rgba(255,255,255,.3); }

/* Recording indicator */
.rec-indicator { position:absolute; top:14px; left:14px; display:flex; align-items:center; gap:6px; background:rgba(0,0,0,.5); border-radius:99px; padding:5px 12px; font-size:.75rem; color:#fff; backdrop-filter:blur(8px); }
.rec-dot { width:8px; height:8px; border-radius:50%; background:#ef4444; animation:pulse 1.5s infinite; }

/* Mic button */
.mic-section { display:flex; flex-direction:column; align-items:center; gap:12px; }
.mic-btn-wrap { position:relative; display:flex; align-items:center; justify-content:center; }
.mic-ripple { position:absolute; width:80px; height:80px; border-radius:50%; background:rgba(10,255,237,.2); animation:ripple 1.5s infinite; display:none; }
.mic-ripple-2 { animation-delay:.5s; }
.mic-btn {
  width:72px; height:72px; border-radius:50%; border:none; cursor:pointer;
  background:linear-gradient(135deg,rgba(10,255,237,.15),rgba(99,102,241,.15));
  border:2px solid rgba(10,255,237,.3);
  color:#0affed; font-size:1.6rem;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; position:relative; z-index:2;
}
.mic-btn:hover { background:linear-gradient(135deg,rgba(10,255,237,.25),rgba(99,102,241,.25)); transform:scale(1.05); }
.mic-btn.recording { background:linear-gradient(135deg,rgba(239,68,68,.2),rgba(239,68,68,.1)); border-color:rgba(239,68,68,.5); color:#f87171; }
.mic-label { font-size:.82rem; color:rgba(255,255,255,.4); text-align:center; }
.mic-label.recording { color:#f87171; }

/* Question side */
.question-side { display:flex; flex-direction:column; gap:16px; }
.question-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:20px; padding:24px; flex:1; }
.q-label { font-size:.7rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#0affed; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.q-text { font-family:'Instrument Serif',serif; font-size:1.3rem; color:#fff; line-height:1.5; margin-bottom:16px; }
.speak-btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:9px; border:1px solid rgba(10,255,237,.2); background:rgba(10,255,237,.08); color:#0affed; font-size:.8rem; cursor:pointer; transition:background .2s; }
.speak-btn:hover { background:rgba(10,255,237,.15); }

/* Answer box */
.answer-box { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:16px; }
.answer-label { font-size:.7rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.3); margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
.answer-textarea { width:100%; background:transparent; border:none; outline:none; color:#fff; font-family:'DM Sans',sans-serif; font-size:.9rem; line-height:1.7; resize:none; min-height:120px; }
.answer-textarea::placeholder { color:rgba(255,255,255,.2); }
.char-count { font-size:.72rem; color:rgba(255,255,255,.25); }

/* Submit */
.submit-section { display:flex; gap:10px; }
.btn-submit { flex:1; padding:14px; border:none; border-radius:14px; background:linear-gradient(135deg,#0affed,#6366f1); color:#080b14; font-family:'DM Sans',sans-serif; font-weight:700; font-size:.95rem; cursor:pointer; transition:transform .2s,box-shadow .2s; box-shadow:0 4px 20px rgba(10,255,237,.2); }
.btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(10,255,237,.3); }
.btn-skip { padding:14px 20px; border-radius:14px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); color:rgba(255,255,255,.4); font-family:'DM Sans',sans-serif; font-weight:600; font-size:.95rem; cursor:pointer; transition:background .2s; }
.btn-skip:hover { background:rgba(255,255,255,.08); color:#fff; }

/* Status bar */
.iv-status { position:relative; z-index:20; padding:10px 24px; border-top:1px solid rgba(255,255,255,.06); display:flex; align-items:center; gap:8px; }
.status-dot { width:6px; height:6px; border-radius:50%; background:#34d399; }
.status-text { font-size:.78rem; color:rgba(255,255,255,.35); }

@media(max-width:768px) {
  .iv-main { grid-template-columns:1fr; }
  .camera-wrap { aspect-ratio:16/9; }
}
</style>

<div class="iv-page">
  <div class="iv-bg"></div>
  <div class="iv-grid"></div>

  <!-- Top Bar -->
  <div class="iv-topbar">
    <div class="iv-brand">Interview<em>IQ</em></div>
    <div class="progress-wrap">
      <span class="progress-text">Question {{ question_number }}/{{ total_questions }}</span>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" style="width:{{ (question_number / total_questions * 100)|int }}%"></div>
      </div>
    </div>
    <div class="timer-badge" id="timerBadge">
      <i class="bi bi-clock"></i>
      <span id="timerText">02:00</span>
    </div>
  </div>

  <!-- Main -->
  <div class="iv-main">

    <!-- Camera Side -->
    <div class="camera-side">
      <div class="camera-wrap" id="cameraWrap">
        <video id="cameraVideo" class="camera-video" autoplay muted playsinline></video>
        <div class="camera-overlay" id="cameraOverlay">
          <i class="bi bi-camera-video-off camera-off-icon"></i>
          <span class="camera-off-text">Camera starting...</span>
        </div>
        <div class="rec-indicator" id="recIndicator" style="display:none;">
          <div class="rec-dot"></div> REC
        </div>
      </div>

      <!-- Mic Button -->
      <div class="mic-section">
        <div class="mic-btn-wrap">
          <div class="mic-ripple" id="ripple1"></div>
          <div class="mic-ripple mic-ripple-2" id="ripple2"></div>
          <button class="mic-btn" id="micBtn" onclick="toggleMic()">
            <i class="bi bi-mic" id="micIcon"></i>
          </button>
        </div>
        <div class="mic-label" id="micLabel">Click to speak your answer</div>
      </div>
    </div>

    <!-- Question Side -->
    <div class="question-side">
      <div class="question-card">
        <div class="q-label"><i class="bi bi-chat-square-quote"></i> Question {{ question_number }}</div>
        <div class="q-text" id="questionText">{{ question }}</div>
        <button class="speak-btn" onclick="speakQuestion()">
          <i class="bi bi-volume-up"></i> Read question aloud
        </button>
      </div>

      <div class="answer-box">
        <div class="answer-label">
          <span><i class="bi bi-pencil"></i> Your Answer</span>
          <span class="char-count" id="charCount">0 / 1000</span>
        </div>
        <textarea
          class="answer-textarea"
          id="answerText"
          placeholder="Speak using the mic or type your answer here..."
          maxlength="1000"
          oninput="updateCharCount()"
        ></textarea>
      </div>

      <form method="POST" action="/interview/question" id="submitForm">
        <input type="hidden" name="answer" id="answerInput"/>
        <div class="submit-section">
          <button type="button" class="btn-skip" onclick="skipQuestion()">
            Skip
          </button>
          <button type="button" class="btn-submit" onclick="submitAnswer()">
            <i class="bi bi-arrow-right-circle"></i>
            {% if question_number == total_questions %}Finish Interview{% else %}Next Question{% endif %}
          </button>
        </div>
      </form>
    </div>

  </div>

  <!-- Status Bar -->
  <div class="iv-status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Initializing camera and microphone...</span>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────
let mediaStream     = null;
let recognition     = null;
let isRecording     = false;
let timerInterval   = null;
let secondsLeft     = 120;
let fullTranscript  = "";

// ── Camera ────────────────────────────────────────────────────
async function startCamera() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    const video = document.getElementById('cameraVideo');
    video.srcObject = mediaStream;
    video.onloadedmetadata = () => {
      document.getElementById('cameraOverlay').style.display = 'none';
      document.getElementById('recIndicator').style.display  = 'flex';
      setStatus('Camera ready — click mic to start speaking', '#34d399');
    };
  } catch(e) {
    setStatus('Camera/mic access denied — you can still type your answer', '#f87171');
    document.querySelector('.camera-off-text').textContent = 'Camera access denied';
  }
}

// ── Speech to Text ────────────────────────────────────────────
function setupSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('Speech recognition not supported — please type your answer', '#fbbf24');
    return;
  }
  recognition = new SR();
  recognition.continuous     = true;
  recognition.interimResults = true;
  recognition.lang           = 'en-US';

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        fullTranscript += e.results[i][0].transcript + ' ';
      } else {
        interim = e.results[i][0].transcript;
      }
    }
    document.getElementById('answerText').value = fullTranscript + interim;
    updateCharCount();
  };

  recognition.onerror = (e) => {
    setStatus('Mic error: ' + e.error + ' — try typing instead', '#f87171');
    stopMic();
  };

  recognition.onend = () => {
    if (isRecording) recognition.start();
  };
}

function toggleMic() {
  if (isRecording) stopMic();
  else startMic();
}

function startMic() {
  if (!recognition) { setupSpeechRecognition(); }
  if (!recognition) return;
  fullTranscript = document.getElementById('answerText').value;
  recognition.start();
  isRecording = true;
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('micIcon').className = 'bi bi-mic-fill';
  document.getElementById('micLabel').textContent = 'Recording... click to stop';
  document.getElementById('micLabel').classList.add('recording');
  document.getElementById('ripple1').style.display = 'block';
  document.getElementById('ripple2').style.display = 'block';
  setStatus('Recording your answer...', '#0affed');
}

function stopMic() {
  if (recognition) recognition.stop();
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micIcon').className = 'bi bi-mic';
  document.getElementById('micLabel').textContent = 'Click to speak your answer';
  document.getElementById('micLabel').classList.remove('recording');
  document.getElementById('ripple1').style.display = 'none';
  document.getElementById('ripple2').style.display = 'none';
  setStatus('Answer recorded — click Next or edit below', '#34d399');
}

// ── Text to Speech ────────────────────────────────────────────
function speakQuestion() {
  const text = document.getElementById('questionText').textContent;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US';
    utt.rate = 0.9;
    window.speechSynthesis.speak(utt);
    setStatus('Reading question aloud...', '#818cf8');
  }
}

// ── Timer ─────────────────────────────────────────────────────
function startTimer() {
  timerInterval = setInterval(() => {
    secondsLeft--;
    const m = Math.floor(secondsLeft / 60).toString().padStart(2,'0');
    const s = (secondsLeft % 60).toString().padStart(2,'0');
    document.getElementById('timerText').textContent = m + ':' + s;
    const badge = document.getElementById('timerBadge');
    if (secondsLeft <= 30) {
      badge.className = 'timer-badge danger';
    } else if (secondsLeft <= 60) {
      badge.className = 'timer-badge warning';
    }
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      setStatus('Time up! Submitting answer...', '#f87171');
      setTimeout(submitAnswer, 1500);
    }
  }, 1000);
}

// ── Submit ────────────────────────────────────────────────────
function submitAnswer() {
  if (isRecording) stopMic();
  clearInterval(timerInterval);
  window.speechSynthesis.cancel();
  const answer = document.getElementById('answerText').value.trim();
  document.getElementById('answerInput').value = answer;
  setStatus('Submitting answer...', '#0affed');
  document.getElementById('submitForm').submit();
}

function skipQuestion() {
  if (isRecording) stopMic();
  clearInterval(timerInterval);
  document.getElementById('answerInput').value = '';
  document.getElementById('submitForm').submit();
}

// ── Helpers ───────────────────────────────────────────────────
function updateCharCount() {
  const len = document.getElementById('answerText').value.length;
  document.getElementById('charCount').textContent = len + ' / 1000';
}

function setStatus(msg, color) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusDot').style.background = color || '#34d399';
}

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  setupSpeechRecognition();
  await startCamera();
  startTimer();
  // Auto-speak question after 1 second
  setTimeout(speakQuestion, 1000);
});

window.addEventListener('beforeunload', () => {
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  window.speechSynthesis.cancel();
});
</script>

{% endblock %}
