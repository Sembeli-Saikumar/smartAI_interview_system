<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — Smart Interview System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F1F5FB;font-family:'Plus Jakarta Sans',sans-serif;padding:32px 16px;position:relative;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 10% 15%,rgba(37,99,235,.06) 0%,transparent 60%),radial-gradient(ellipse 55% 40% at 90% 80%,rgba(99,102,241,.05) 0%,transparent 55%);pointer-events:none;z-index:0;}

    .orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:.08;pointer-events:none;z-index:0;}
    .orb-1{width:500px;height:500px;background:#2563EB;top:-150px;left:-150px;}
    .orb-2{width:400px;height:400px;background:#6366F1;bottom:-120px;right:-120px;}

    .card{position:relative;z-index:10;width:100%;max-width:460px;background:rgba(255,255,255,.85);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(226,232,240,.8);border-radius:28px;padding:40px 36px;box-shadow:0 8px 48px rgba(37,99,235,.08),0 2px 8px rgba(0,0,0,.04);animation:cardIn .6s cubic-bezier(.22,1,.36,1) both;}
    @keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#2563EB,#6366F1,#06B6D4);border-radius:28px 28px 0 0;}

    .brand{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
    .brand-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#2563EB,#6366F1);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;box-shadow:0 4px 16px rgba(37,99,235,.3);transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
    .brand:hover .brand-icon{transform:scale(1.08) rotate(-4deg);}
    .brand-name{font-size:1.4rem;font-weight:800;color:#0F172A;letter-spacing:-.02em;}
    .brand-name em{font-style:normal;background:linear-gradient(135deg,#2563EB,#6366F1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

    h2{font-size:1.6rem;font-weight:800;color:#0F172A;margin-bottom:4px;letter-spacing:-.03em;}
    .sub{color:#64748B;font-size:.88rem;margin-bottom:24px;}

    .flash{border-radius:12px;padding:10px 14px;font-size:.84rem;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-weight:500;}
    .flash-danger{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;}
    .flash-success{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534;}

    .role-label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748B;margin-bottom:10px;}
    .role-btns{display:flex;gap:10px;margin-bottom:20px;}
    .role-btn{flex:1;padding:14px 8px;border-radius:14px;border:1.5px solid #E2E8F0;background:#F8FAFC;color:#64748B;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:center;gap:6px;}
    .role-btn i{font-size:1.3rem;transition:transform .2s;}
    .role-btn:hover{background:#EFF6FF;color:#2563EB;border-color:#BFDBFE;transform:translateY(-2px);box-shadow:0 4px 12px rgba(37,99,235,.1);}
    .role-btn:hover i{transform:scale(1.15);}
    .role-btn.active-admin{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.3);color:#D97706;box-shadow:0 4px 12px rgba(245,158,11,.1);}
    .role-btn.active-interviewer{background:rgba(37,99,235,.06);border-color:rgba(37,99,235,.3);color:#2563EB;box-shadow:0 4px 12px rgba(37,99,235,.1);}

    .field{margin-bottom:16px;}
    .field label{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#64748B;display:block;margin-bottom:6px;}
    .field-wrap{position:relative;}
    .field-input{width:100%;padding:12px 14px 12px 42px;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:14px;color:#0F172A;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;outline:none;transition:all .2s;}
    .field-input::placeholder{color:#94A3B8;}
    .field-input:focus{border-color:#2563EB;background:#fff;box-shadow:0 0 0 4px rgba(37,99,235,.1);}
    .fi{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:.95rem;pointer-events:none;transition:color .2s;}
    .field-wrap:focus-within .fi{color:#2563EB;}
    .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94A3B8;cursor:pointer;font-size:.95rem;padding:0;transition:color .2s;}
    .toggle-pw:hover{color:#2563EB;}

    .str-bar-wrap{height:4px;background:#E2E8F0;border-radius:99px;margin-top:6px;overflow:hidden;}
    .str-bar{height:100%;border-radius:99px;width:0;transition:width .3s,background .3s;}
    .str-label{font-size:.72rem;color:#94A3B8;margin-top:4px;font-weight:500;}

    .terms-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:20px;}
    .terms-row input{width:15px;height:15px;accent-color:#2563EB;margin-top:2px;flex-shrink:0;}
    .terms-row label{font-size:.82rem;color:#64748B;}
    .terms-row a{color:#2563EB;text-decoration:none;font-weight:600;}

    .btn-submit{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#2563EB,#6366F1);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(37,99,235,.25);display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;}
    .btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,99,235,.35);}

    .login-link{text-align:center;margin-top:18px;font-size:.85rem;color:#64748B;}
    .login-link a{color:#2563EB;text-decoration:none;font-weight:700;}
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-cpu-fill"></i></div>
      <div class="brand-name">Smart <em>Interview</em></div>
    </div>

    <h2>Create account</h2>
    <p class="sub">Register as Admin or Interviewer</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for c,m in messages %}
        <div class="flash flash-{{ c }}"><i class="bi bi-info-circle"></i> {{ m }}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <!-- Role Selector — Admin & Interviewer only -->
    <div class="role-label">Register as</div>
    <div class="role-btns">
      <button type="button" class="role-btn" id="btn-admin"
              onclick="selectRole('admin')">
        <i class="bi bi-shield-check"></i> Admin
      </button>
      <button type="button" class="role-btn active-interviewer" id="btn-interviewer"
              onclick="selectRole('interviewer')">
        <i class="bi bi-person-badge"></i> Interviewer
      </button>
    </div>

    <form action="/auth/register" method="POST" novalidate>
      <input type="hidden" name="role" id="roleInput" value="interviewer"/>

      <div class="field">
        <label>Full Name</label>
        <div class="field-wrap">
          <i class="bi bi-person fi"></i>
          <input type="text" class="field-input" name="name"
                 placeholder="Your full name" required/>
        </div>
      </div>

      <div class="field">
        <label>Email Address</label>
        <div class="field-wrap">
          <i class="bi bi-envelope fi"></i>
          <input type="email" class="field-input" name="email"
                 placeholder="you@example.com" required/>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <i class="bi bi-lock fi"></i>
          <input type="password" class="field-input" name="password" id="pwField"
                 placeholder="Min. 8 characters"
                 oninput="checkStrength(this.value)" required/>
          <button type="button" class="toggle-pw" onclick="togglePw()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
        <div class="str-bar-wrap"><div class="str-bar" id="strBar"></div></div>
        <div class="str-label" id="strLabel">Enter a password</div>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <div class="field-wrap">
          <i class="bi bi-shield-lock fi"></i>
          <input type="password" class="field-input" name="confirm_password"
                 placeholder="Re-enter password" required/>
        </div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms" required/>
        <label for="terms">I agree to the
          <a href="#">Terms of Service</a> and
          <a href="#">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="btn-submit">
        <i class="bi bi-rocket-takeoff"></i> Create Account
      </button>
    </form>

    <p class="login-link">Already have an account?
      <a href="/auth/login">Sign in</a>
    </p>
  </div>

  <script>
    function selectRole(role) {
      document.getElementById('roleInput').value = role;
      document.querySelectorAll('.role-btn').forEach(b =>
        b.classList.remove('active-admin','active-interviewer')
      );
      document.getElementById('btn-' + role).classList.add('active-' + role);
    }
    function togglePw() {
      const f = document.getElementById('pwField');
      const i = document.getElementById('eyeIcon');
      f.type = f.type === 'password' ? 'text' : 'password';
      i.className = f.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    }
    function checkStrength(val) {
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const map = [
        {w:'0%',   bg:'#EF4444', txt:'Too weak'},
        {w:'30%',  bg:'#EF4444', txt:'Weak'},
        {w:'55%',  bg:'#F59E0B', txt:'Fair'},
        {w:'80%',  bg:'#10B981', txt:'Good'},
        {w:'100%', bg:'#2563EB', txt:'Strong 🔒'},
      ];
      document.getElementById('strBar').style.width      = map[score].w;
      document.getElementById('strBar').style.background = map[score].bg;
      document.getElementById('strLabel').textContent    = map[score].txt;
      document.getElementById('strLabel').style.color    = map[score].bg;
    }
  </script>
</body>
</html>
