<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Smart Interview System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg,#f0f7ff);font-family:'DM Sans',sans-serif;padding:24px 16px;overflow-y:auto;}

    /* Soft orbs */
    .orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:.1;pointer-events:none;z-index:0;}
    .orb-1{width:500px;height:500px;background:#1e6091;top:-150px;left:-150px;}
    .orb-2{width:400px;height:400px;background:#168aad;bottom:-120px;right:-120px;}
    .orb-3{width:300px;height:300px;background:#a5ccd1;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.07;}

    /* Card */
    .login-card{position:relative;z-index:10;width:100%;max-width:460px;background:#fff;border:1px solid #d0e8f2;border-radius:24px;padding:44px 40px;box-shadow:0 8px 48px rgba(30,96,145,.1);}

    /* Brand */
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
    .brand-icon{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#1e6091,#168aad);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:#fff;}
    .brand-name{font-family:'Instrument Serif',serif;font-size:1.6rem;color:#0d2d3f;}
    .brand-name em{font-style:italic;background:linear-gradient(135deg,#1e6091,#168aad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

    h2{font-family:'Instrument Serif',serif;font-size:1.8rem;color:#0d2d3f;margin-bottom:6px;}
    .sub{color:#6b8a96;font-size:.9rem;margin-bottom:28px;}

    /* Flash */
    .flash{border-radius:10px;padding:10px 14px;font-size:.84rem;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
    .flash-success{background:rgba(26,122,74,.08);border:1px solid rgba(26,122,74,.2);color:#1a7a4a;}
    .flash-danger{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);color:#c0392b;}
    .flash-warning{background:rgba(184,104,10,.08);border:1px solid rgba(184,104,10,.2);color:#b8680a;}
    .flash-info{background:rgba(30,96,145,.08);border:1px solid rgba(30,96,145,.2);color:#1e6091;}

    /* Role selector — only 2 roles */
    .role-label{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#6b8a96;margin-bottom:10px;}
    .role-btns{display:flex;gap:10px;margin-bottom:28px;}
    .role-btn{flex:1;padding:12px 8px;border-radius:14px;border:1px solid #d0e8f2;background:#f0f7ff;color:#6b8a96;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;}
    .role-btn i{font-size:1.3rem;}
    .role-btn:hover{background:#d0e8f2;color:#0d2d3f;border-color:#a5ccd1;}
    .role-btn.active-admin{background:rgba(184,104,10,.08);border-color:rgba(184,104,10,.3);color:#b8680a;}
    .role-btn.active-interviewer{background:rgba(30,96,145,.08);border-color:rgba(30,96,145,.3);color:#1e6091;}

    /* Form fields */
    .field-group{margin-bottom:18px;}
    .field-label{font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#5a7d90;margin-bottom:8px;display:block;}
    .field-wrap{position:relative;}
    .field-input{width:100%;padding:14px 44px;background:#f0f7ff;border:1px solid #d0e8f2;border-radius:14px;color:#0d2d3f;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s,background .2s;}
    .field-input::placeholder{color:#9ab5c0;}
    .field-input:focus{border-color:#168aad;background:#fff;box-shadow:0 0 0 3px rgba(22,138,173,.12);}
    .field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9ab5c0;font-size:1rem;pointer-events:none;}
    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#9ab5c0;cursor:pointer;font-size:1rem;padding:0;transition:color .2s;}
    .toggle-pw:hover{color:#1e6091;}

    /* Remember */
    .remember-row{display:flex;align-items:center;gap:8px;margin-bottom:24px;}
    .remember-row input[type="checkbox"]{width:16px;height:16px;accent-color:#1e6091;cursor:pointer;}
    .remember-row label{font-size:.83rem;color:#6b8a96;cursor:pointer;}

    /* Submit */
    .btn-signin{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,#1e6091,#168aad);color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(30,96,145,.2);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;}
    .btn-signin:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(30,96,145,.3);}

    /* Register link */
    .register-row{text-align:center;font-size:.87rem;color:#6b8a96;}
    .register-row a{color:#1e6091;text-decoration:none;font-weight:600;}
    .register-row a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-cpu-fill"></i></div>
      <div class="brand-name">Smart <em>Interview</em></div>
    </div>

    <h2>Welcome back</h2>
    <p class="sub">Sign in to continue your interview prep</p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">
            <i class="bi bi-info-circle"></i> {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Role Selector — Admin & Interviewer only -->
    <div class="role-label">Login as</div>
    <div class="role-btns">
      <button type="button" class="role-btn" id="btn-admin"
              onclick="fillRole('admin')">
        <i class="bi bi-shield-check"></i> Admin
      </button>
      <button type="button" class="role-btn" id="btn-interviewer"
              onclick="fillRole('interviewer')">
        <i class="bi bi-person-badge"></i> Interviewer
      </button>
    </div>

    <!-- Form -->
    <form action="/auth/login" method="POST" novalidate>

      <div class="field-group">
        <label class="field-label">Email Address</label>
        <div class="field-wrap">
          <i class="bi bi-envelope field-icon"></i>
          <input type="email" class="field-input" name="email"
                 id="emailField" placeholder="you@example.com" required/>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <i class="bi bi-lock field-icon"></i>
          <input type="password" class="field-input" name="password"
                 id="pwField" placeholder="Enter your password" required/>
          <button type="button" class="toggle-pw" onclick="togglePw()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="rememberMe"/>
        <label for="rememberMe">Remember me</label>
      </div>

      <button type="submit" class="btn-signin">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>

    </form>

    <div class="register-row">
      Don't have an account? <a href="/auth/register">Create one</a>
    </div>

  </div>

  <script>
    const roles = {
      admin:       { email: 'ssaikumar99513@gmail.com', cls: 'active-admin' },
      interviewer: { email: '',                          cls: 'active-interviewer' },
    };
    function fillRole(role) {
      document.querySelectorAll('.role-btn').forEach(b =>
        b.classList.remove('active-admin','active-interviewer')
      );
      document.getElementById('btn-' + role).classList.add(roles[role].cls);
      document.getElementById('emailField').value = roles[role].email;
      document.getElementById('pwField').focus();
    }
    function togglePw() {
      const f = document.getElementById('pwField');
      const i = document.getElementById('eyeIcon');
      if (f.type === 'password') { f.type = 'text';     i.className = 'bi bi-eye-slash'; }
      else                       { f.type = 'password'; i.className = 'bi bi-eye'; }
    }
  </script>
</body>
</html>
