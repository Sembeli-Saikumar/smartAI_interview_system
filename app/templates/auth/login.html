<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Smart Interview System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F1F5FB;font-family:'Plus Jakarta Sans',sans-serif;padding:24px 16px;overflow-y:auto;position:relative;}

    /* Animated gradient bg */
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 10% 15%,rgba(37,99,235,.06) 0%,transparent 60%),radial-gradient(ellipse 55% 40% at 90% 80%,rgba(99,102,241,.05) 0%,transparent 55%),radial-gradient(ellipse 40% 35% at 50% 50%,rgba(6,182,212,.04) 0%,transparent 50%);pointer-events:none;z-index:0;animation:bgPulse 12s ease-in-out infinite alternate;}
    @keyframes bgPulse{0%{opacity:1}100%{opacity:.6}}

    /* Soft orbs */
    .orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:.08;pointer-events:none;z-index:0;}
    .orb-1{width:500px;height:500px;background:#2563EB;top:-150px;left:-150px;}
    .orb-2{width:400px;height:400px;background:#6366F1;bottom:-120px;right:-120px;}
    .orb-3{width:300px;height:300px;background:#06B6D4;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.05;}

    /* Card */
    .login-card{position:relative;z-index:10;width:100%;max-width:460px;background:rgba(255,255,255,.85);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(226,232,240,.8);border-radius:28px;padding:44px 40px;box-shadow:0 8px 48px rgba(37,99,235,.08),0 2px 8px rgba(0,0,0,.04);animation:cardIn .6s cubic-bezier(.22,1,.36,1) both;}
    @keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#2563EB,#6366F1,#06B6D4);border-radius:28px 28px 0 0;}

    /* Brand */
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
    .brand-icon{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#2563EB,#6366F1);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:#fff;box-shadow:0 4px 16px rgba(37,99,235,.3);transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
    .brand:hover .brand-icon{transform:scale(1.08) rotate(-4deg);}
    .brand-name{font-size:1.5rem;font-weight:800;color:#0F172A;letter-spacing:-.02em;}
    .brand-name em{font-style:normal;background:linear-gradient(135deg,#2563EB,#6366F1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

    h2{font-size:1.7rem;font-weight:800;color:#0F172A;margin-bottom:6px;letter-spacing:-.03em;}
    .sub{color:#64748B;font-size:.9rem;margin-bottom:28px;}

    /* Flash */
    .flash{border-radius:12px;padding:10px 14px;font-size:.84rem;margin-bottom:18px;display:flex;align-items:center;gap:8px;font-weight:500;}
    .flash-success{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534;}
    .flash-danger{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;}
    .flash-warning{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;}
    .flash-info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1D4ED8;}

    /* Role selector */
    .role-label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#64748B;margin-bottom:10px;}
    .role-btns{display:flex;gap:10px;margin-bottom:28px;}
    .role-btn{flex:1;padding:14px 8px;border-radius:14px;border:1.5px solid #E2E8F0;background:#F8FAFC;color:#64748B;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column;align-items:center;gap:6px;}
    .role-btn i{font-size:1.3rem;transition:transform .2s;}
    .role-btn:hover{background:#EFF6FF;color:#2563EB;border-color:#BFDBFE;transform:translateY(-2px);box-shadow:0 4px 12px rgba(37,99,235,.1);}
    .role-btn:hover i{transform:scale(1.15);}
    .role-btn.active-admin{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.3);color:#D97706;box-shadow:0 4px 12px rgba(245,158,11,.1);}
    .role-btn.active-interviewer{background:rgba(37,99,235,.06);border-color:rgba(37,99,235,.3);color:#2563EB;box-shadow:0 4px 12px rgba(37,99,235,.1);}

    /* Form fields */
    .field-group{margin-bottom:18px;}
    .field-label{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#64748B;margin-bottom:8px;display:block;}
    .field-wrap{position:relative;}
    .field-input{width:100%;padding:14px 44px;background:#F8FAFC;border:1.5px solid #E2E8F0;border-radius:14px;color:#0F172A;font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;outline:none;transition:all .2s;}
    .field-input::placeholder{color:#94A3B8;}
    .field-input:focus{border-color:#2563EB;background:#fff;box-shadow:0 0 0 4px rgba(37,99,235,.1);}
    .field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:1rem;pointer-events:none;transition:color .2s;}
    .field-wrap:focus-within .field-icon{color:#2563EB;}
    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94A3B8;cursor:pointer;font-size:1rem;padding:0;transition:color .2s;}
    .toggle-pw:hover{color:#2563EB;}

    /* Remember */
    .remember-row{display:flex;align-items:center;gap:8px;margin-bottom:24px;}
    .remember-row input[type="checkbox"]{width:16px;height:16px;accent-color:#2563EB;cursor:pointer;border-radius:4px;}
    .remember-row label{font-size:.83rem;color:#64748B;cursor:pointer;}

    /* Submit */
    .btn-signin{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,#2563EB,#6366F1);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(37,99,235,.25);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;position:relative;overflow:hidden;letter-spacing:.01em;}
    .btn-signin:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,99,235,.35);}
    .btn-signin:active{transform:translateY(0);}

    /* Register link */
    .register-row{text-align:center;font-size:.87rem;color:#64748B;}
    .register-row a{color:#2563EB;text-decoration:none;font-weight:700;}
    .register-row a:hover{text-decoration:underline;}

    /* Ripple */
    .ripple-effect{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:rippleAnim .6s linear;pointer-events:none;}
    @keyframes rippleAnim{to{transform:scale(4);opacity:0}}
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-cpu-fill"></i></div>
      <div class="brand-name">Smart <em>Interview</em></div>
    </div>

    <h2>Welcome back</h2>
    <p class="sub">Sign in to continue your interview prep</p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">
            <i class="bi bi-info-circle"></i> {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- Role Selector — Admin & Interviewer only -->
    <div class="role-label">Login as</div>
    <div class="role-btns">
      <button type="button" class="role-btn" id="btn-admin"
              onclick="fillRole('admin')">
        <i class="bi bi-shield-check"></i> Admin
      </button>
      <button type="button" class="role-btn" id="btn-interviewer"
              onclick="fillRole('interviewer')">
        <i class="bi bi-person-badge"></i> Interviewer
      </button>
    </div>

    <!-- Form -->
    <form action="/auth/login" method="POST" novalidate>

      <div class="field-group">
        <label class="field-label">Email Address</label>
        <div class="field-wrap">
          <i class="bi bi-envelope field-icon"></i>
          <input type="email" class="field-input" name="email"
                 id="emailField" placeholder="you@example.com" required/>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <i class="bi bi-lock field-icon"></i>
          <input type="password" class="field-input" name="password"
                 id="pwField" placeholder="Enter your password" required/>
          <button type="button" class="toggle-pw" onclick="togglePw()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="rememberMe"/>
        <label for="rememberMe">Remember me</label>
      </div>

      <button type="submit" class="btn-signin">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>

    </form>

    <div class="register-row">
      Don't have an account? <a href="/auth/register">Create one</a>
    </div>

  </div>

  <script>
    const roles = {
      admin:       { email: 'ssaikumar99513@gmail.com', cls: 'active-admin' },
      interviewer: { email: '',                          cls: 'active-interviewer' },
    };
    function fillRole(role) {
      document.querySelectorAll('.role-btn').forEach(b =>
        b.classList.remove('active-admin','active-interviewer')
      );
      document.getElementById('btn-' + role).classList.add(roles[role].cls);
      document.getElementById('emailField').value = roles[role].email;
      document.getElementById('pwField').focus();
    }
    function togglePw() {
      const f = document.getElementById('pwField');
      const i = document.getElementById('eyeIcon');
      if (f.type === 'password') { f.type = 'text';     i.className = 'bi bi-eye-slash'; }
      else                       { f.type = 'password'; i.className = 'bi bi-eye'; }
    }
  </script>
</body>
</html>
